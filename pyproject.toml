#:tombi schema.strict = false

[project]
name = "PeakFit"
version = "2025.11.0"
description = "PeakFit allow for lineshape fitting in pseudo-3D NMR spectra."
authors = [
    { name = "Guillaume Bouvignies", email = "guillaume.bouvignies@ens.psl.eu" },
]
dependencies = [
    "numpy>=2.2.0",
    "matplotlib>=3.9.0",
    "rich>=13.7.1",
    "nmrglue>=0.10",
    "pandas>=2.2.2",
    "scipy>=1.13.1",
    "networkx>=3.3",
    "pyqt5>=5.15.11",
    "pydantic>=2.5.0",
    "typer>=0.9.0",
    "tomli-w>=1.0.0",
    "threadpoolctl>=3.0.0",
    "numba>=0.60.0",
    "joblib>=1.5.2",
]
requires-python = ">=3.13"
readme = "README.md"
license = { text = "GPL-3.0-or-later" }

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
    "mypy>=1.0",
    "ruff>=0.7.0",
    "pre-commit>=3.0",
    "types-setuptools>=75.0",
]
mcmc = [
    "emcee>=3.1.6",
]
performance = [
    "intel-cmplr-lib-rt>=2024.0.0",
]

[project.scripts]
peakfit = "peakfit.cli.app:app"

[build-system]
requires = ["uv_build>=0.9.10,<0.10.0"]
build-backend = "uv_build"

[tool.ruff]
line-length = 100
target-version = "py313"
src = ["src"]
extend-exclude = [
    ".venv",
    "*.egg-info",
    "build",
    "dist",
    ".git",
    "__pycache__",
    "*.pyc",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
docstring-code-format = true
docstring-code-line-length = 88

[tool.ruff.lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort
    "N",      # pep8-naming
    "UP",     # pyupgrade
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "SIM",    # flake8-simplify
    "ARG",    # flake8-unused-arguments
    "PTH",    # flake8-use-pathlib
    "RET",    # flake8-return
    "NPY",    # numpy-specific rules
    "PERF",   # performance anti-patterns
    "RUF",    # ruff-specific rules
    "S",      # flake8-bandit (security)
    "BLE",    # flake8-blind-except
    "T10",    # flake8-debugger
    "PLW",    # pylint warnings (subset of PL)
]
ignore = [
    "E501",    # Line too long (handled by formatter)
    "S301",    # pickle usage (safe in controlled contexts)
    "RUF001",  # Ambiguous Unicode characters (intentional for UI: ℹ, ✓, etc.)
    "RUF002",  # Ambiguous Unicode characters in docstrings (intentional: ν for nu)
]
fixable = ["ALL"]
unfixable = []

[tool.ruff.lint.isort]
known-first-party = ["peakfit"]
combine-as-imports = true
split-on-trailing-comma = false

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.per-file-ignores]
"tests/**/*" = ["S101", "ARG"]  # assert and unused fixtures are required in tests
"src/peakfit/__init__.py" = ["E402"]  # Module import after code (version check)

[tool.pyright]
venvPath = "."
venv = ".venv"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks tests as integration tests",
]

[tool.coverage.run]
source = ["src/peakfit"]
omit = [
    "*/tests/*",
    "*/__pycache__/*",
]

[tool.coverage.report]
show_missing = true
skip_covered = false
precision = 2

[tool.mypy]
python_version = "3.13"
warn_return_any = true
warn_unused_configs = true
check_untyped_defs = true
warn_redundant_casts = true
warn_unused_ignores = true
strict_equality = true

[[tool.mypy.overrides]]
module = [
    "nmrglue.*",
    "scipy.*",
    "networkx.*",
    "emcee.*",
    "matplotlib.*",
    "pandas.*",
    "threadpoolctl.*",
    "numba.*",
]
ignore_missing_imports = true
